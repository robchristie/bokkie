services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: bokkie
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./run/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bokkie"]
      interval: 10s
      timeout: 5s
      retries: 5

  bokkie-api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CODEX_VERSION: "0.115.0"
    depends_on:
      postgres:
        condition: service_healthy
    user: "${BOKKIE_CONTAINER_UID:-1000}:${BOKKIE_CONTAINER_GID:-1000}"
    restart: unless-stopped
    working_dir: /workspace
    command: >
      sh -lc "mkdir -p /workspace/.bokkie/runs /workspace/.worker-cache /workspace/.worker-worktrees /workspace/run/home &&
      uv run bokkie api --host ${BOKKIE_API_HOST:-0.0.0.0} --port ${BOKKIE_API_PORT:-8008}"
    environment:
      HOME: /workspace/run/home
      BOKKIE_DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/bokkie
      BOKKIE_REPO_ROOT: /workspace
      BOKKIE_BOKKIE_CONFIG_PATH: /workspace/bokkie.toml
      BOKKIE_RUNS_ROOT: /workspace/.bokkie/runs
      BOKKIE_ARTIFACTS_DIR: /workspace/.bokkie/runs
      BOKKIE_WORKER_CACHE_DIR: /workspace/.worker-cache
      BOKKIE_WORKER_WORKTREE_DIR: /workspace/.worker-worktrees
    env_file:
      - .env
    volumes:
      - .:/workspace
    ports:
      - "${BOKKIE_API_PORT:-8008}:${BOKKIE_API_PORT:-8008}"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, urllib.request; urllib.request.urlopen('http://127.0.0.1:%s/healthz' % os.getenv('BOKKIE_API_PORT', '8008')).read()\""]
      interval: 15s
      timeout: 5s
      retries: 5
