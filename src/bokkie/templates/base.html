<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title }} · Bokkie</title>
    <style>
      :root {
        --bg: #f3efe4;
        --card: #fffdf8;
        --text: #1f2421;
        --muted: #5b645e;
        --accent: #0f766e;
        --accent-soft: #d6f5ef;
        --border: #d8d2c3;
      }
      body {
        margin: 0;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top right, rgba(15, 118, 110, 0.08), transparent 30%),
          linear-gradient(180deg, #f8f5ec 0%, var(--bg) 100%);
        color: var(--text);
      }
      header, main {
        max-width: 1180px;
        margin: 0 auto;
        padding: 1.25rem;
      }
      nav a {
        color: var(--text);
        margin-right: 1rem;
        text-decoration: none;
        font-weight: 600;
      }
      .grid {
        display: grid;
        gap: 1rem;
      }
      .stack {
        display: grid;
        gap: 0.75rem;
      }
      .cards {
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 1rem;
        box-shadow: 0 12px 30px rgba(31, 36, 33, 0.05);
      }
      form {
        display: grid;
        gap: 0.75rem;
      }
      input, textarea, select, button {
        font: inherit;
      }
      input, textarea, select {
        width: 100%;
        box-sizing: border-box;
        padding: 0.65rem 0.75rem;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #fff;
      }
      textarea {
        min-height: 7rem;
        resize: vertical;
      }
      button {
        padding: 0.65rem 0.9rem;
        border: 0;
        border-radius: 999px;
        background: var(--accent);
        color: #fff;
        cursor: pointer;
        font-weight: 600;
      }
      .button-secondary {
        background: #e7e1d2;
        color: var(--text);
      }
      .inline-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        align-items: center;
      }
      .split {
        display: grid;
        gap: 1rem;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th, td {
        text-align: left;
        padding: 0.75rem;
        border-bottom: 1px solid var(--border);
      }
      .pill {
        display: inline-block;
        padding: 0.2rem 0.6rem;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 0.9rem;
      }
      .muted {
        color: var(--muted);
      }
      .mono {
        font-family: "IBM Plex Mono", monospace;
      }
      pre {
        overflow-x: auto;
        white-space: pre-wrap;
      }
      .hero {
        display: grid;
        gap: 0.75rem;
        margin-bottom: 1rem;
      }
      .artifact-links {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
      }
      .artifact-links a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Bokkie</h1>
      <nav>
        <a href="/ui/intake">Intake</a>
        <a href="/ui/campaigns">Campaigns</a>
        <a href="/ui/runs">Runs</a>
        <a href="/ui/reviews">Approvals</a>
        <a href="/ui/workers">Workers</a>
        <a href="/ui/executors">Executors</a>
      </nav>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
